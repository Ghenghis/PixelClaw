# ─── Model Switching Strategy ────────────────────────────────────────────────
# How agents handle model transitions while maintaining conversation context.
#
# IMPORTANT: LM Studio's stateful chats (response_id / previous_response_id)
# only work within the SAME model. When switching models:
#
# 1. Agent stores conversation summary in PixelClaw memory DB
# 2. Current model is unloaded (if VRAM constrained)
# 3. New model is loaded via POST /api/v1/models/load
# 4. Agent replays relevant context as system_prompt + input
# 5. New response_id chain begins with the new model
#
# For same-model continuations, use previous_response_id for zero-cost context.

switching:
  strategy: "memory_replay"
  max_context_summary_tokens: 2000
  auto_unload_idle_minutes: 30
  parallel_models_max: 2
  prefer_flash_attention: true
  default_context_length: 8192
  moe_context_length: 16384
