# PixelClaw Model Registry
# Defines all available models, agent roles, and routing rules.
#
# Model locations:
#   Primary:   C:\Users\Admin\.lmstudio\models  (52 models, ~481 GB)
#   Secondary: Configurable via model_directories below
#
# Agent roles determine which models are loaded for each task type.
# VRAM tiers control automatic load/unload behavior based on available GPU memory.

model_directories:
  - "C:\\Users\\Admin\\.lmstudio\\models"
  # Add additional model directories here:
  # - "D:\\models\\gguf"
  # - "E:\\ai-models"

# ─── VRAM Tiers ──────────────────────────────────────────────────────────────
# Agents pick the best model that fits in available VRAM.
# tier_preference: [ultra, large, medium, small, tiny] — fallback order
vram_tiers:
  ultra:   { min_vram_gb: 40, description: "48+ GB VRAM (dual GPU or A6000+)" }
  large:   { min_vram_gb: 20, description: "24 GB VRAM (RTX 4090, 3090)" }
  medium:  { min_vram_gb: 8,  description: "12 GB VRAM (RTX 4070, 3060 12GB)" }
  small:   { min_vram_gb: 4,  description: "6-8 GB VRAM (RTX 3060, 4060)" }
  tiny:    { min_vram_gb: 2,  description: "4 GB VRAM or CPU-only" }

# ─── Agent Roles ─────────────────────────────────────────────────────────────
# Each agent role has a tier_preference (fallback order) and recommended models per tier.
agent_roles:
  code:
    description: "Writes, edits, and reviews code"
    tier_preference: [large, medium, small, ultra, tiny]
    models:
      ultra:
        - qwen/qwen3-coder-next                  # 80B Q4_K_M — flagship coder
      large:
        - unsloth/qwen3-coder-30b-a3b-instruct   # 30B-A3B MoE Q5_K_XL — best MoE coder
        - spectralyst/qwen3-coder-reap-25b-a3b_moe # 103x1.8B MoE — experimental
        - mistralai/devstral-small-2-2512         # 24B Q4_K_M — Mistral coding
      medium:
        - Nerdsking/nerdsking-python-coder-7b-i   # 7.6B Q8_0 — current default
        - DavidAU/glm-4.7-flash-uncensored-heretic-neo-code-imatrix-max  # 64x2.6B Q6_K
      small:
        - Nerdsking/nerdsking-python-coder-3b-i   # 3.1B Q8_0 — fast lightweight
        - unsloth/qwen3-4b-instruct-2507          # 4B Q6_K_XL
      tiny:
        - mradermacher/qwen2.5-coder-3b-instruct-distill-qwen3-coder-next-abliterated  # 3B Q4_K_S

  reasoning:
    description: "Complex problem solving, architecture decisions, planning"
    tier_preference: [large, medium, ultra, small]
    models:
      ultra:
        - qwen/qwen3-coder-next                  # 80B — also excellent at reasoning
      large:
        - zai-org/glm-4.7-flash                   # 30B Q4_K_M
        - DavidAU/qwen3-24b-a4b-freedom-thinking-abliterated-heretic-neo-imatrix  # 4x6B MoE Q8_0
      medium:
        - openai/gpt-oss-20b                      # 20B MXFP4 — reasoning.effort support
        - mistralai/ministral-3-14b-reasoning     # 14B Q4_K_M — reasoning-focused
        - zai-org/glm-4.6v-flash                  # 9.4B Q4_K_M
      small:
        - DavidAU/qwen3-4b-gemini-triplex-high-reasoning-thinking-heretic-uncensored  # 4B Q8_0

  vision:
    description: "Analyzes screenshots, UI elements, images, visual debugging"
    tier_preference: [large, medium, small]
    models:
      large:
        - mradermacher/huihui-qwen3-vl-32b-instruct-abliterated  # 32B Q5_K_S
        - mradermacher/qwen2.5-vl-32b-instruct-abliterated       # 32B Q6_K
        - OpenMOSE/qwen3-vl-reap-24b-a3b         # 96x1.8B MoE Q4_K_M
      medium:
        - mradermacher/qwen3-vl-8b-instruct-abliterated-v2.0     # 8B Q8_0
        - zai-org/glm-4.6v-flash                  # 9.4B Q4_K_M (vision capable)
      small:
        - lmstudio-community/qwen/qwen3-vl-4b    # 4B Q6_K — best small vision
        - huihui-ai/qwen2.5-vl-3b-instruct-abliterated  # 3B Q4_K_M
        - prithivMLmods/qwen3-vl-2b-thinking-abliterated-v1  # 2B F16
        - mradermacher/qwen3-vl-2b-instruct-abliterated  # 2B Q6_K
        - lmstudio-community/qwen2-vl-2b-instruct # 2B Q8_0

  tool_use:
    description: "MCP tool calling, function execution, agent orchestration"
    tier_preference: [medium, large, small]
    models:
      large:
        - unsloth/qwen3-coder-30b-a3b-instruct   # MoE, trained for tool use
        - mistralai/devstral-small-2-2512         # 24B, strong tool calling
      medium:
        - Nerdsking/nerdsking-python-coder-7b-i   # 7.6B — tool use capable
        - openai/gpt-oss-20b                      # 20B — good at structured output
        - mistralai/ministral-3-14b-reasoning     # 14B
      small:
        - Nerdsking/nerdsking-python-coder-3b-i   # 3.1B
        - NovachronoAI/ministral-3b-instruct-abliterated  # 3.4B Q4_K_M

  chat:
    description: "General conversation, documentation, explanations"
    tier_preference: [medium, small, large]
    models:
      large:
        - zai-org/glm-4.7-flash                   # 30B Q4_K_M
        - DavidAU/qwen3-24b-a4b-freedom-thinking-abliterated-heretic-neo-imatrix
      medium:
        - dphn/dolphin3.0-llama3.1-8b             # 8B Q8_0 — good general chat
        - openai/gpt-oss-20b                      # 20B
        - zai-org/glm-4.6v-flash                  # 9.4B
      small:
        - unsloth/qwen3-4b-instruct-2507          # 4B Q6_K_XL
        - NovachronoAI/ministral-3b-instruct-abliterated  # 3.4B

  evony:
    description: "Evony-specific game knowledge (custom fine-tuned models)"
    tier_preference: [medium, small, large]
    models:
      large:
        - Borg/evony-7b-3800                      # F16 15.2 GB — highest quality
        - Borg/evony-qwen3-8b-phase2@f16          # F16 15.2 GB
      medium:
        - Borg/evony-qwen3-8b-phase2@q8_0         # Q8_0 8.1 GB
        - Borg/evony-7b-3800-rtx3090ti            # Q8 8.1 GB
        - Borg/evony-7b-rtx3090ti                 # Q8 8.1 GB
        - Borg/evony-7b-3800-rx7800xt             # Q6 6.3 GB
      small:
        - Borg/evony-qwen3-8b-phase2@q4_k_m       # Q4_K_M 4.7 GB
        - Borg/evony-7b-3800-rtx3060              # Q4 4.7 GB
        - Borg/evony-7b-rtx3060                   # Q4 4.7 GB
      tiny:
        - Borg/evony-7b-3800-speed                # Q3 3.8 GB
        - Borg/evony-7b-speed                     # Q3 3.8 GB
        - Borg/evony-7b-3800-ultrafast            # Q2 3.0 GB
        - Borg/evony-7b-ultrafast                 # Q2 3.0 GB

