name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            extension/package-lock.json
            extension/webview-ui/package-lock.json

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Building release $tag (version $ver)"

      - name: Install dependencies
        run: |
          cd extension
          npm install --include=dev
          cd webview-ui
          npm install --include=dev

      - name: Sync version in extension package.json
        shell: pwsh
        run: |
          $pkg = Get-Content extension/package.json -Raw | ConvertFrom-Json
          $pkg.version = "${{ steps.version.outputs.VERSION }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content extension/package.json -Encoding UTF8

      - name: Build extension
        run: |
          cd extension
          node esbuild.js --production

      - name: Build webview-ui
        run: |
          cd extension/webview-ui
          npx tsc -b
          npx vite build

      - name: Verify build
        run: |
          if (!(Test-Path "extension/dist/extension.js")) { throw "Build failed: extension.js missing" }
          if (!(Test-Path "extension/dist/webview/index.html")) { throw "Build failed: webview missing" }

      - name: Package VSIX
        run: |
          cd extension
          npx @vscode/vsce package --no-dependencies -o ../releases/pixelclaw-${{ steps.version.outputs.TAG }}.vsix

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.TAG }}"
          $zipName = "pixelclaw-${ver}-win-x64.zip"
          $stagingDir = "releases/pixelclaw-${ver}-win-x64"

          # Create staging directory
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          # Copy built extension
          Copy-Item -Recurse extension/dist "$stagingDir/dist"
          Copy-Item extension/package.json "$stagingDir/package.json"
          Copy-Item extension/icon.png "$stagingDir/icon.png" -ErrorAction SilentlyContinue

          # Copy VSIX into zip
          Copy-Item "releases/pixelclaw-${ver}.vsix" "$stagingDir/" -ErrorAction SilentlyContinue

          # Copy docs
          New-Item -ItemType Directory -Force -Path "$stagingDir/docs" | Out-Null
          Copy-Item docs/ARCHITECTURE.md "$stagingDir/docs/" -ErrorAction SilentlyContinue
          Copy-Item docs/pixelclaw-architecture.html "$stagingDir/docs/" -ErrorAction SilentlyContinue
          Copy-Item README.md "$stagingDir/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "$stagingDir/" -ErrorAction SilentlyContinue

          # Create install.bat
          @"
          @echo off
          echo ============================================
          echo   PixelClaw Installer
          echo ============================================
          echo.

          REM Find the VSIX file
          for %%f in (*.vsix) do (
              echo Installing %%f into VS Code...
              code --install-extension "%%f"
              if errorlevel 1 (
                  echo.
                  echo ERROR: Failed to install extension.
                  echo Make sure VS Code is installed and 'code' is in your PATH.
                  pause
                  exit /b 1
              )
              echo.
              echo SUCCESS: PixelClaw extension installed!
              echo.
              echo Open VS Code and look for the Pixel Agents panel.
              echo.
              pause
              exit /b 0
          )

          echo ERROR: No .vsix file found in this directory.
          pause
          exit /b 1
          "@ | Set-Content "$stagingDir/install.bat" -Encoding ASCII

          # Create uninstall.bat
          @"
          @echo off
          echo Uninstalling PixelClaw extension...
          code --uninstall-extension pablodelucca.pixel-agents
          echo Done.
          pause
          "@ | Set-Content "$stagingDir/uninstall.bat" -Encoding ASCII

          # Create the ZIP
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "releases/$zipName" -Force
          Write-Host "Created releases/$zipName"

      - name: List release artifacts
        run: Get-ChildItem releases/ | Format-Table Name, Length -AutoSize

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PixelClaw ${{ steps.version.outputs.TAG }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            releases/pixelclaw-${{ steps.version.outputs.TAG }}.vsix
            releases/pixelclaw-${{ steps.version.outputs.TAG }}-win-x64.zip
          body: |
            ## PixelClaw ${{ steps.version.outputs.TAG }}

            ### Installation

            **Option 1 — VSIX (recommended)**
            1. Download `pixelclaw-${{ steps.version.outputs.TAG }}.vsix`
            2. In VS Code: `Ctrl+Shift+P` → **Extensions: Install from VSIX…**
            3. Select the downloaded file

            **Option 2 — Windows ZIP**
            1. Download `pixelclaw-${{ steps.version.outputs.TAG }}-win-x64.zip`
            2. Extract anywhere
            3. Run `install.bat`

            ### Requirements
            - VS Code ≥ 1.107.0
            - Node.js ≥ 20 (for development only)

            ### Documentation
            - [Architecture](https://ghenghis.github.io/PixelClaw/)
            - [Full Docs](https://github.com/Ghenghis/PixelClaw/tree/main/docs)
